<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Waters</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header card">
    <div>
      <h1>🌊 Open Waters</h1>
      <p>SUP аренда • Строгино</p>
    </div>

    <div class="bonus-chip">
      💎 <span id="bonusBalance">0</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="booking">Бронь</button>
    <button class="tab" data-tab="wheel">Колесо</button>
    <button class="tab" data-tab="profile">Профиль</button>
  </div>

  <div class="tab-content active" id="booking-tab">

    <div class="card">
      <h2>📅 Бронирование</h2>

      <label>Дата</label>
      <input type="date" id="date">

      <label>Время</label>
      <select id="time"></select>

      <label>Длительность</label>
      <select id="duration">
        <option value="1">1 час</option>
        <option value="2">2 часа</option>
        <option value="3">3 часа</option>
      </select>

      <label>SUP</label>
      <div class="counter">
        <button onclick="changeSup(-1)">-</button>
        <span id="supCount">1</span>
        <button onclick="changeSup(1)">+</button>
      </div>

      <div class="bonus-box">
        <div>
          <strong>Использовать бонусы</strong>
          <p>Баланс: <span id="bonusBalance2">0</span></p>
        </div>

        <input type="checkbox" id="useBonus">
      </div>

      <div class="price-box">
        <div class="price-row">
          <span>Стоимость</span>
          <span id="price">0 ₽</span>
        </div>

        <div class="price-row total">
          <span>Итого</span>
          <span id="total">0 ₽</span>
        </div>
      </div>

      <button class="main-btn" onclick="createBooking()">
        Отправить заявку
      </button>
    </div>
  </div>

  <div class="tab-content" id="wheel-tab">

    <div class="card center">
      <h2>🎰 Колесо удачи</h2>

      <div class="wheel-wrapper">

        <div class="pointer"></div>

        <div class="wheel" id="wheel">
          <div class="wheel-center">🌊</div>
        </div>
      </div>

      <button class="main-btn" onclick="spinWheel()">
        Крутить
      </button>

      <p id="wheelResult">Удачи 🍀</p>
    </div>
  </div>

  <div class="tab-content" id="profile-tab">

    <div class="card">
      <h2>👤 Профиль</h2>

      <div class="profile-row">
        <span>Имя</span>
        <strong id="profileName"></strong>
      </div>

      <div class="profile-row">
        <span>Бонусы</span>
        <strong id="profileBonus"></strong>
      </div>

      <div class="profile-row">
        <span>Посещения</span>
        <strong id="profileVisits"></strong>
      </div>

      <input id="refLink" readonly>

      <button class="secondary-btn" onclick="copyRef()">
        Скопировать реферальную ссылку
      </button>
    </div>

    <div class="card">
      <h2>📋 История</h2>
      <div id="history"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
